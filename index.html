<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <title>Project: Admin Dashboard</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="header">
      <div class="first-part-header">
        <div class="search-bar"></div>
        <div class="settings-buttons">
          <p>Morgan Oakley</p>
        </div>
      </div>
      <div class="second-part-header">
        <div class="welcome">
          <img />
          <p>Hi there,</p>
          <p>Morgan Oakley (@morgan)</p>
        </div>
        <div class="buttons">
          <button class="header-item">New</button>
          <button class="header-item">Upload</button>
          <button class="header-item">Share</button>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="dashboard-title">Dashboard</div>
      <div class="dashboard-set1">
        <p class="set1">Home</p>
        <p class="set1">Profile</p>
        <p class="set1">Messages</p>
        <p class="set1">History</p>
        <p class="set1">Tasks</p>
        <p class="set1">Communities</p>
      </div>
      <div class="dashboard-set2">
        <p class="set2">Settings</p>
        <p class="set2">Support</p>
        <p class="set2">Privacy</p>
      </div>
    </div>
  </body>
</html>
